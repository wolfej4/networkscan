services:
  netscan:
    build: .
    image: netscan:latest
    container_name: netscan
    # Host networking is required for accurate ARP / MAC discovery,
    # mDNS / SSDP multicast listening, and scanning your LAN as if from
    # the host itself.
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./data:/data
    environment:
      - NETSCAN_PORT=8080
      - NETSCAN_DEFAULT_TARGET=192.168.1.0/24
      # How often (seconds) to ping known hosts for uptime tracking. 0 disables.
      - NETSCAN_UPTIME_INTERVAL=300
      # Optional: SNMP v2c community string. When set, NetScan will try
      # SNMP LLDP/CDP discovery against switches and routers.
      - NETSCAN_SNMP_COMMUNITY=
    restart: unless-stopped
